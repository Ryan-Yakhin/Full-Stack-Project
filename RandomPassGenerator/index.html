<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomPasswordGenerator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="pass-container">
        <h4>Random Password Generator</h4>
        <div class="input-container">
            <input class="input" type="text" id="password" placeholder="create password" readonly>
            <i class="fa-solid fa-copy fa-2x"></i>
        </div>
        <button class="btn" id="btn">Generate</button>
    </div>
    <div class="alert-container active"></div>
    <script src="script.js"></script>
</body>
</html>
